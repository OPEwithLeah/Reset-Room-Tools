<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Reset Room — Exercise Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep: #2A1438;
    --bg-panel: #361B47;
    --bg-panel-light: #422258;
    --gold: #C9A876;
    --gold-light: #E8CFA0;
    --rose: #C98F82;
    --text-primary: #F5F0E8;
    --text-secondary: #C4B4CE;
    --text-muted: #9A85A8;
    --success: #8FAE8B;
    --border-soft: rgba(201,168,118,0.25);
    --radius: 14px;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 18px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow-x: hidden;
  }

  /* Signature ambient ribbon — echoes the brand graphic, kept quiet and behind content */
  .ribbon-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.5;
  }
  .ribbon-bg svg { width: 100%; height: 100%; }

  header.top {
    position: relative;
    z-index: 2;
    padding: 28px 24px 18px;
    text-align: center;
  }
  header.top h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 34px;
    letter-spacing: 0.04em;
    color: var(--gold-light);
    margin: 0 0 4px;
  }
  header.top p.tag {
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 0;
  }

  main {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 20px 60px;
  }

  .panel {
    width: 100%;
    max-width: 620px;
    background: var(--bg-panel);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 36px 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  }

  /* progress dots */
  .progress {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 30px;
  }
  .progress .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(201,168,118,0.25);
    transition: background 0.25s ease, transform 0.25s ease;
  }
  .progress .dot.active {
    background: var(--gold);
    transform: scale(1.25);
  }
  .progress .dot.done {
    background: var(--gold-light);
  }

  .step-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--text-primary);
    text-align: center;
    margin: 0 0 8px;
  }
  .step-sub {
    text-align: center;
    color: var(--text-secondary);
    font-size: 16px;
    margin: 0 0 28px;
  }

  .option-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .option-grid.single-col { grid-template-columns: 1fr; }

  .option-card {
    background: var(--bg-panel-light);
    border: 2px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    transition: border-color 0.2s ease, background 0.2s ease, transform 0.1s ease;
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .option-card:hover { border-color: var(--gold); }
  .option-card:active { transform: scale(0.98); }
  .option-card.selected {
    border-color: var(--gold);
    background: rgba(201,168,118,0.18);
    color: var(--gold-light);
  }
  .option-card .sub {
    display: block;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 32px;
  }

  button.btn {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 40px;
    border: none;
    cursor: pointer;
    transition: transform 0.1s ease, opacity 0.2s ease;
  }
  button.btn:active { transform: scale(0.97); }
  button.btn:disabled { opacity: 0.35; cursor: not-allowed; }

  button.btn-primary {
    background: var(--gold);
    color: var(--bg-deep);
  }
  button.btn-primary:hover:not(:disabled) { background: var(--gold-light); }

  button.btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border-soft);
  }
  button.btn-ghost:hover { color: var(--text-primary); border-color: var(--gold); }

  button.btn-link {
    background: none;
    border: none;
    color: var(--text-muted);
    text-decoration: underline;
    font-size: 15px;
    cursor: pointer;
    padding: 8px;
  }
  button.btn-link:hover { color: var(--gold-light); }

  /* workout output */
  .workout-header {
    text-align: center;
    margin-bottom: 24px;
  }
  .workout-header h2 {
    font-family: 'Playfair Display', serif;
    color: var(--gold-light);
    font-size: 28px;
    margin: 0 0 6px;
  }
  .workout-meta {
    color: var(--text-secondary);
    font-size: 15px;
  }

  .block {
    background: var(--bg-panel-light);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 20px;
  }
  .block-label {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 14px;
  }
  .exercise-card {
    background: var(--bg-panel);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .exercise-card:last-child { margin-bottom: 0; }
  .exercise-name {
    font-size: 19px;
    font-weight: 700;
    color: var(--text-primary);
    margin: 0 0 6px;
  }
  .exercise-links {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  a.video-link {
    color: var(--gold-light);
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  a.video-link:hover { text-decoration: underline; }

  .toggle-btn {
    background: rgba(201,168,118,0.12);
    border: 1px solid var(--border-soft);
    color: var(--text-secondary);
    font-size: 14px;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
  }
  .toggle-btn:hover { border-color: var(--gold); color: var(--gold-light); }

  .detail-box {
    display: none;
    margin-top: 12px;
    padding: 14px 16px;
    background: rgba(0,0,0,0.18);
    border-radius: 8px;
    font-size: 15.5px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .detail-box.open { display: block; }
  .detail-box .label {
    color: var(--gold);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }
  .detail-box .section { margin-bottom: 12px; }
  .detail-box .section:last-child { margin-bottom: 0; }

  .action-row {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .energy-note {
    text-align: center;
    color: var(--text-muted);
    font-size: 15px;
    margin: -8px 0 24px;
    font-style: italic;
  }

  footer.bottom-nav {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 20px;
  }

  @media (max-width: 480px) {
    body { font-size: 17px; }
    header.top h1 { font-size: 27px; }
    .panel { padding: 26px 18px; }
    .option-grid { grid-template-columns: 1fr; }
    .step-title { font-size: 22px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  :focus-visible {
    outline: 3px solid var(--gold-light);
    outline-offset: 2px;
  }
</style>
</head>

// Muscle-group pairing map used to build supersets/circuits.
// Each group lists every group it can validly train alongside —
// not a strict 1:1 opposite, so the algorithm has real options to draw from.
/* ============================================================
   SAFE LOCAL STORAGE (some preview/sandboxed contexts throw on
   localStorage access entirely — never let that break rendering)
============================================================ */
function safeGetItem(key) {
  try { return localStorage.getItem(key); } catch(e) { return null; }
}
function safeSetItem(key, value) {
  try { localStorage.setItem(key, value); return true; } catch(e) { return false; }
}

/* ============================================================
   REMEMBERED EQUIPMENT
   Saves whatever equipment a member last selected on this device
   and pre-fills it next time, so they're not re-selecting from
   scratch every visit — but it's always editable, since their
   situation can change (travel, new gear, etc.).
============================================================ */
const EQUIPMENT_MEMORY_KEY = 'resetRoomLastEquipment';
function loadRememberedEquipment() {
  try {
    const saved = JSON.parse(safeGetItem(EQUIPMENT_MEMORY_KEY) || 'null');
    return Array.isArray(saved) ? saved : [];
  } catch(e) { return []; }
}
function rememberEquipment(equipmentArr) {
  safeSetItem(EQUIPMENT_MEMORY_KEY, JSON.stringify(equipmentArr));
}

/* ============================================================
   DAY TYPE CONFIG
   Upper Body day = push muscles; the "missed upper" component
   used on Glutes+Upper and HIIT combo days = pull muscles.
   This keeps the system fully stateless (no need to remember
   what a previous day actually trained).
============================================================ */
const UPPER_PUSH = ['chest','shoulders','triceps'];
const UPPER_PULL = ['back','lats','biceps','rear_delts'];
const LEG_ONLY = ['quads','hamstrings','calves']; // glutes intentionally excluded — reserved for the Glutes + Upper day
const LOWER_ALL = ['quads','hamstrings','glutes','calves']; // used for Total Body, which covers everything

const DAY_TYPES = {
  lower_body:       { label: 'Lower Body', groups: LEG_ONLY, isHiit: false },
  upper_body:       { label: 'Upper Body', groups: UPPER_PUSH.concat(UPPER_PULL), isHiit: false },
  hiit_cardio_core: { label: 'HIIT / Cardio + Core', groups: ['core'], isHiit: true },
  glutes_upper:     { label: 'Glutes + Upper Pull', groups: ['glutes'].concat(UPPER_PULL), isHiit: false },
  total_body:       { label: 'Total Body Strength', groups: LOWER_ALL.concat(UPPER_PUSH).concat(UPPER_PULL).concat(['core']), isHiit: false },
  active_recovery:  { label: 'Active Recovery', groups: [], isHiit: false, recoveryOnly: true }
};

function buildWeeklySplit(daysPerWeek) {
  let split;
  if (daysPerWeek <= 3) {
    split = ['lower_body','upper_body','glutes_upper'];
  } else if (daysPerWeek === 4) {
    split = ['lower_body','upper_body','hiit_cardio_core','glutes_upper'];
  } else if (daysPerWeek === 5) {
    split = ['lower_body','upper_body','hiit_cardio_core','glutes_upper','total_body'];
  } else {
    split = ['lower_body','upper_body','hiit_cardio_core','glutes_upper','total_body','active_recovery'];
  }
  return split.slice(0, daysPerWeek);
}

function offDayCardioNote(setting) {
  if (setting === 'commercial') return '30 minutes on cardio machines of your choice.';
  return 'Dancing, biking, walking, or jogging — anything that keeps you moving.';
}

/* ============================================================
   UPPER BODY / PULL FOCUS OPTIONS
   Explicit, guaranteed-balanced sub-focus choices instead of
   letting the algorithm freely pick across all upper-body
   muscle groups (which can't promise even coverage on its own).
============================================================ */
const UPPER_FOCUS_OPTIONS = [
  { value:'shoulders_reardelts_lats', label:'Shoulders / Rear Delts / Lats', groups:['shoulders','rear_delts','lats'] },
  { value:'back_biceps_lats',         label:'Back / Biceps / Lats',          groups:['back','biceps','lats'] },
  { value:'chest_triceps',            label:'Chest / Triceps',               groups:['chest','triceps'] },
  { value:'biceps_triceps',           label:'Biceps / Triceps',              groups:['biceps','triceps'] },
  { value:'chest_back',               label:'Chest / Back',                  groups:['chest','back'] },
];

// Pull-only subset, used for the Glutes + Upper Pull day
const PULL_FOCUS_OPTIONS = [
  { value:'shoulders_reardelts_lats', label:'Shoulders / Rear Delts / Lats', groups:['shoulders','rear_delts','lats'] },
  { value:'back_biceps_lats',         label:'Back / Biceps / Lats',          groups:['back','biceps','lats'] },
];

function upperFocusApplies() {
  return answers.dayType === 'upper_body' || answers.dayType === 'glutes_upper';
}
function focusOptionsForCurrentDay() {
  return answers.dayType === 'glutes_upper' ? PULL_FOCUS_OPTIONS : UPPER_FOCUS_OPTIONS;
}

// Soft nudge toward variety: tracks which focus combo was picked last for
// each day type, so we can flag whichever hasn't been trained in a while —
// still fully self-select, just a gentle "haven't done this recently" hint.
const FOCUS_USAGE_KEY = 'resetRoomFocusUsage';
function loadFocusUsage() {
  try { return JSON.parse(safeGetItem(FOCUS_USAGE_KEY) || '{}'); } catch(e) { return {}; }
}
function recordFocusUsage(dayType, focusValue) {
  const map = loadFocusUsage();
  let maxSeq = 0;
  Object.values(map).forEach(v => { if (v > maxSeq) maxSeq = v; });
  map[dayType + '::' + focusValue] = maxSeq + 1;
  safeSetItem(FOCUS_USAGE_KEY, JSON.stringify(map));
}
function leastRecentFocusValue(dayType, options) {
  const map = loadFocusUsage();
  const hasAnyHistory = options.some(o => (dayType + '::' + o.value) in map);
  if (!hasAnyHistory) return null; // nothing trained yet at all — nothing to call "overdue"
  let bestSeq = Infinity;
  options.forEach(o => {
    const seq = map[dayType + '::' + o.value] || 0;
    if (seq < bestSeq) bestSeq = seq;
  });
  const tied = options.filter(o => (map[dayType + '::' + o.value] || 0) === bestSeq);
  return pickRandom(tied).value;
}
function resolvedDayGroups() {
  const dayConfig = currentDayConfig();
  if (answers.dayType === 'upper_body') {
    const opt = UPPER_FOCUS_OPTIONS.find(o => o.value === answers.upperFocus);
    return opt ? opt.groups : dayConfig.groups;
  }
  if (answers.dayType === 'glutes_upper') {
    const opt = PULL_FOCUS_OPTIONS.find(o => o.value === answers.upperFocus);
    return opt ? ['glutes'].concat(opt.groups) : dayConfig.groups;
  }
  return dayConfig.groups;
}

// Muscle-group pairing map: which groups sensibly train alongside each other
// in the same circuit. Used to walk a coherent chain (opposing/neighbor
// muscle each step) instead of picking muscle groups at random.
const PAIRINGS = {
  chest:      ['triceps','rear_delts','back'],
  back:       ['chest','biceps','shoulders','lats'],
  triceps:    ['chest','biceps'],
  rear_delts: ['chest','biceps','shoulders','lats'],
  biceps:     ['back','rear_delts','lats','triceps'],
  lats:       ['biceps','back','rear_delts'],
  shoulders:  ['rear_delts','back'],
  quads:      ['hamstrings','glutes','calves'],
  hamstrings: ['quads','glutes'],
  glutes:     ['quads','hamstrings','calves'],
  calves:     ['quads','glutes'],
  core:       []
};

// Strips equipment names and stance/position modifiers so exercises that are
// really the same movement (e.g. "Bent Over Rear Delt Fly" vs "Incline Rear
// Delt Fly") get recognized as duplicates and never both appear in one workout.
const FAMILY_STOP_WORDS = new Set(['db','dumbbell','kb','kettlebell','bb','barbell','cable','rb','band','bands',
  'resistance','medicine','ball','ez','bar','bent','over','incline','decline','seated','standing','kneeling',
  'half','flat','single','arm','sa','double','da','leg','sl','iso','hold','weighted','alternating','elevated',
  'close','stance','wide','cs','ws','reverse','grip','rg','or','to','and','a','g','ass','grass','wall','goblet',
  'staggered','runner','plank','with','of','the','front','behind','neck','w']);

function movementFamily(name) {
  const tokens = name.toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(Boolean);
  const core = tokens.filter(t => !FAMILY_STOP_WORDS.has(t))
    .map(t => (t.endsWith('s') && t.length > 3) ? t.slice(0,-1) : t);
  return core.sort().join('-');
}

const LEVEL_RANK = { beginner:1, intermediate:2, advanced:3 };
// Each tier draws from a distinct, overlapping band rather than "everything
// at or below" — otherwise Advanced pools end up flooded with beginner
// isolation moves (Leg Extension, Leg Curl, etc.) that don't belong there.
const LEVEL_INCLUDES = {
  beginner:     ['beginner'],
  intermediate: ['beginner','intermediate'],
  advanced:     ['intermediate','advanced'],
};
const PHASE_OPTIONS = { beginner:[2,3], intermediate:[3,4], advanced:[4,5] };
const ROUNDS_BY_TIME = { 10:2, 20:4, 30:6, 45:8 };
const AMRAP_WINDOW_BY_TIME = { 10:8, 20:12, 30:16, 45:20 };

/* ============================================================

============================================================ */
const STEPS = ['daysPerWeek','dayType','upperFocus','injuries','energy','time','setting','equipment','level','phase','review'];
let stepIndex = 0;
let weeklySplit = [];
let answers = { daysPerWeek:null, dayType:null, dayIndex:null, upperFocus:null, injuries:[], energy:null, time:null, setting:null, equipment:loadRememberedEquipment(), level:null, phase:null };

function getStepContent(key) {
  switch(key) {
    case 'daysPerWeek':
      return { title: 'How many days a week do you train?', sub: '', type:'single',
        options: [3,4,5,6].map(n => ({ value:n, label: n + ' days' })) };
    case 'dayType': {
      weeklySplit = buildWeeklySplit(answers.daysPerWeek);
      return { title: 'Which day is today?', sub: "Based on your split — tap to pick, or choose a different day if you're out of order.", type:'single',
        options: weeklySplit.map((dt,i) => ({ value:i, label: `Day ${i+1}: ${DAY_TYPES[dt].label}` })) };
    }
    case 'upperFocus': {
      const isPullDay = answers.dayType === 'glutes_upper';
      const baseOptions = focusOptionsForCurrentDay();
      const recommended = leastRecentFocusValue(answers.dayType, baseOptions);
      const options = baseOptions.map(o => ({
        value: o.value,
        label: o.label,
        sub: o.value === recommended ? "Haven't trained this in a while" : undefined
      }));
      return { title: isPullDay ? "Today's pull focus?" : "Today's upper body focus?",
        sub: 'Rotate through these for a fully balanced upper body — pick whichever fits today.',
        type:'single', options };
    }
    case 'injuries':
      return { title: 'Any injuries or areas to work around?', sub: "Select all that apply. For Cervical, Ankle, or Other, we don't have specific exercise modifications built in yet — please speak with your coach directly about those.", type:'multi',
        options: [
          { value:'none', label:'None' },
          { value:'back', label:'Back' },
          { value:'knee', label:'Knee' },
          { value:'shoulder', label:'Shoulder' },
          { value:'cervical', label:'Cervical (Neck)' },
          { value:'ankle', label:'Ankle' },
          { value:'other', label:'Other' },
        ] };
    case 'energy':
      return { title: "How's your energy today?", sub: 'This shapes the pace of your session.', type:'single',
        options: [
          { value:'low', label:'Low', sub:'Slower pace, more recovery' },
          { value:'moderate', label:'Moderate', sub:'Steady, sustainable effort' },
          { value:'high', label:'High', sub:'Ready to push' },
        ] };
    case 'time':
      return { title: 'How much time do you have?', sub: '', type:'single',
        options: [10,20,30,45].map(n => ({ value:n, label: (n===45?'45+':n) + ' minutes' })) };
    case 'setting':
      return { title: 'Where are you training?', sub: '', type:'single',
        options: [ { value:'home', label:'Home' }, { value:'commercial', label:'Commercial Gym' } ] };
    case 'equipment':
      return { title: "What's available to you?", sub: 'Select everything you have access to right now.', type:'multi',
        options: [
          { value:'bodyweight', label:'Bodyweight Only' },
          { value:'dumbbells', label:'Dumbbells' },
          { value:'bands', label:'Resistance Bands' },
          { value:'barbell', label:'Barbell' },
          { value:'kettlebell', label:'Kettlebell' },
          { value:'machine', label:'Machines' },
          { value:'cable', label:'Cable Machine' },
          { value:'bench', label:'Bench' },
          { value:'medicine_ball', label:'Medicine Ball' },
          { value:'stability_ball', label:'Stability Ball' },
        ] };
    case 'level':
      return { title: "What's your experience level?", sub: '', type:'single',
        options: [
          { value:'beginner', label:'Beginner' },
          { value:'intermediate', label:'Intermediate' },
          { value:'advanced', label:'Advanced' },
        ] };
    case 'phase': {
      const opts = PHASE_OPTIONS[answers.level] || [2,3,4,5];
      return { title: 'How many exercises per circuit today?', sub: "Your plateau-busting cycle — pick where you're at right now.", type:'single',
        options: opts.map(n => ({ value:n, label: n + ' exercises' })) };
    }
  }
}

function isRecoveryDay() {
  return answers.dayIndex !== null && DAY_TYPES[weeklySplit[answers.dayIndex]].recoveryOnly;
}

function renderProgress() {
  // Recovery days short-circuit to just 2 steps
  const total = isRecoveryDay() ? 2 : STEPS.length - 1;
  const shownIndex = isRecoveryDay() ? Math.min(stepIndex,1) : stepIndex;
  let dots = '';
  for (let i=0;i<total;i++){
    let cls = 'dot';
    if (i < shownIndex) cls += ' done';
    if (i === shownIndex) cls += ' active';
    dots += `<div class="${cls}"></div>`;
  }
  return `<div class="progress">${dots}</div>`;
}

function renderStep() {
  const key = STEPS[stepIndex];
  const main = document.getElementById('main');

  if (key === 'review') { renderWorkout(); return; }
  if (key === 'dayType' && answers.dayIndex !== null && isRecoveryDay()) {
    // Active Recovery selected — skip straight to output
    renderWorkout();
    return;
  }

  const content = getStepContent(key);
  const isMulti = content.type === 'multi';
  const gridClass = content.options.length <= 2 ? 'single-col' : '';

  let optionsHtml = content.options.map(opt => {
    const isSelected = key === 'dayType'
      ? answers.dayIndex === opt.value
      : (isMulti ? answers[key].includes(opt.value) : answers[key] === opt.value);
    return `<div class="option-card ${isSelected?'selected':''}" data-value="${opt.value}">
      ${opt.label}${opt.sub ? `<span class="sub">${opt.sub}</span>` : ''}
    </div>`;
  }).join('');

  const canProceed = key === 'dayType'
    ? answers.dayIndex !== null
    : (isMulti ? answers[key].length > 0 : answers[key] !== null);

  main.innerHTML = `
    <div class="panel">
      ${renderProgress()}
      <h2 class="step-title">${content.title}</h2>
      ${content.sub ? `<p class="step-sub">${content.sub}</p>` : ''}
      <div class="option-grid ${gridClass}">${optionsHtml}</div>
      <div class="nav-row">
        <button class="btn btn-ghost" id="backBtn" ${stepIndex===0?'disabled':''}>Back</button>
        <button class="btn btn-primary" id="nextBtn" ${canProceed?'':'disabled'}>
          ${stepIndex === STEPS.length-2 ? 'Build My Workout' : 'Next'}
        </button>
      </div>
    </div>
  `;

  document.querySelectorAll('.option-card').forEach(card => {
    card.addEventListener('click', () => {
      const raw = card.dataset.value;
      if (key === 'dayType') {
        answers.dayIndex = parseInt(raw,10);
        answers.dayType = weeklySplit[answers.dayIndex];
        answers.upperFocus = null;
        renderStep();
        return;
      }
      const numericSteps = ['time','daysPerWeek','phase'];
      const parsedVal = numericSteps.includes(key) ? parseInt(raw,10) : raw;
      if (isMulti) {
        if (key === 'injuries') {
          if (parsedVal === 'none') {
            answers.injuries = ['none'];
          } else {
            answers.injuries = answers.injuries.filter(v => v !== 'none');
            const idx = answers.injuries.indexOf(parsedVal);
            if (idx === -1) answers.injuries.push(parsedVal); else answers.injuries.splice(idx,1);
          }
        } else {
          const idx = answers[key].indexOf(parsedVal);
          if (idx === -1) answers[key].push(parsedVal); else answers[key].splice(idx,1);
          if (key === 'equipment') rememberEquipment(answers.equipment);
        }
      } else {
        answers[key] = parsedVal;
        if (key === 'upperFocus') recordFocusUsage(answers.dayType, parsedVal);
      }
      renderStep();
    });
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    if (stepIndex > 0) {
      stepIndex--;
      if (STEPS[stepIndex] === 'upperFocus' && !upperFocusApplies()) stepIndex--;
      renderStep();
    }
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if (!canProceed) return;
    if (key === 'dayType' && isRecoveryDay()) { renderWorkout(); return; }
    stepIndex++;
    if (STEPS[stepIndex] === 'upperFocus' && !upperFocusApplies()) stepIndex++;
    renderStep();
  });
}

/* ============================================================
   WORKOUT GENERATION
============================================================ */
function currentDayConfig() { return DAY_TYPES[answers.dayType]; }

function pickRandom(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function filterPool() {
  const dayConfig = currentDayConfig();
  const comboAllowed = (answers.dayType === 'total_body' || dayConfig.isHiit);
  const groups = resolvedDayGroups();
  return EXERCISES.filter(e => {
    if (e.comboMove && !comboAllowed) return false;
    if (e.isModification && answers.level === 'advanced') return false;
    if (!groups.includes(e.muscleGroup)) return false;
    if (!e.settings.includes(answers.setting)) return false;
    if (!e.equipment.some(eq => answers.equipment.includes(eq))) return false;
    if (!LEVEL_INCLUDES[answers.level].includes(e.level)) return false;
    if (answers.injuries.length && !answers.injuries.includes('none')) {
      if (answers.injuries.some(inj => (e.contraindications||[]).includes(inj))) return false;
    }
    return true;
  });
}

/* ============================================================
   EXERCISE USAGE TRACKING (per-device, via localStorage)
   Guarantees real variety over weeks/months: every exercise gets
   a "last used" sequence number. When choosing between multiple
   valid candidates for a slot, we always favor whichever one(s)
   have gone longest without being used — so the full library
   cycles through before anything repeats, instead of relying on
   pure chance.
============================================================ */
const USAGE_KEY = 'resetRoomExerciseUsage';

function loadUsageMap() {
  try { return JSON.parse(safeGetItem(USAGE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveUsageMap(map) {
  safeSetItem(USAGE_KEY, JSON.stringify(map));
}
function nextUsageSequence(map) {
  let max = 0;
  Object.values(map).forEach(v => { if (v > max) max = v; });
  return max + 1;
}
function pickLeastRecentlyUsed(candidates, usageMap) {
  // Never-used exercises (no entry in the map) always outrank used ones.
  let best = Infinity;
  candidates.forEach(e => {
    const seq = usageMap[e.id] || 0;
    if (seq < best) best = seq;
  });
  const tier = candidates.filter(e => (usageMap[e.id] || 0) === best);
  return pickRandom(tier);
}
function recordUsage(exerciseIds) {
  const map = loadUsageMap();
  let seq = nextUsageSequence(map);
  exerciseIds.forEach(id => { map[id] = seq; seq++; });
  saveUsageMap(map);
}

function buildCircuit(pool, count, excludeIds, excludeFamilies) {
  const used = new Set(excludeIds || []);
  const usedFamilies = new Set(excludeFamilies || []);
  const usageMap = loadUsageMap();
  const byMuscle = {};
  pool.forEach(e => {
    if (used.has(e.id) || usedFamilies.has(movementFamily(e.name))) return;
    byMuscle[e.muscleGroup] = byMuscle[e.muscleGroup] || [];
    byMuscle[e.muscleGroup].push(e);
  });

  function availableGroups() {
    return Object.keys(byMuscle).filter(mg =>
      byMuscle[mg].some(e => !used.has(e.id) && !usedFamilies.has(movementFamily(e.name)))
    );
  }
  function pickFromGroup(group) {
    const options = byMuscle[group].filter(e => !used.has(e.id) && !usedFamilies.has(movementFamily(e.name)));
    if (!options.length) return null;
    const ex = pickLeastRecentlyUsed(options, usageMap);
    used.add(ex.id);
    usedFamilies.add(movementFamily(ex.name));
    return ex;
  }
  // Among candidate muscle groups, favor whichever has gone longest without
  // being trained — this is what corrects the "shoulders rarely comes up"
  // bias: a group with fewer pairing connections still gets its turn once
  // its exercises are the most overdue in the rotation.
  function pickGroupByStaleness(groups) {
    let bestGroups = [], bestSeq = Infinity;
    groups.forEach(g => {
      const options = byMuscle[g].filter(e => !used.has(e.id) && !usedFamilies.has(movementFamily(e.name)));
      const minSeq = Math.min(...options.map(e => usageMap[e.id] || 0));
      if (minSeq < bestSeq) { bestSeq = minSeq; bestGroups = [g]; }
      else if (minSeq === bestSeq) { bestGroups.push(g); }
    });
    return pickRandom(bestGroups);
  }

  const circuit = [];
  let lastGroup = null;
  for (let i=0; i<count; i++) {
    const avail = availableGroups();
    if (!avail.length) break;
    let group;
    if (lastGroup && PAIRINGS[lastGroup] && PAIRINGS[lastGroup].some(g => avail.includes(g))) {
      // Prefer an opposing/neighbor muscle group connected to the last pick
      const partners = PAIRINGS[lastGroup].filter(g => avail.includes(g));
      group = pickGroupByStaleness(partners);
    } else {
      const notLast = avail.filter(g => g !== lastGroup);
      group = pickGroupByStaleness(notLast.length ? notLast : avail);
    }
    const ex = pickFromGroup(group);
    if (!ex) continue;
    circuit.push(ex);
    lastGroup = ex.muscleGroup;
  }
  return circuit;
}

function repTextFor(exercise) {
  const isLower = ['quads','hamstrings','glutes','calves'].includes(exercise.muscleGroup);
  if (exercise.laterality === 'unilateral') {
    const reps = isLower ? '10' : '12';
    return `${reps} reps each side — complete one side fully, then switch`;
  }
  if (exercise.laterality === 'alternating') {
    const reps = isLower ? '10-12' : '12-15';
    return `${reps} reps total, alternating sides each rep`;
  }
  const reps = isLower ? '10-12' : '15';
  return `${reps} reps`;
}

/* ============================================================
   WARM-UP MOVES, categorized by body part so the warm-up actually
   matches what's about to be trained instead of always being the
   same three moves regardless of day type.
============================================================ */
const LOWER_BODY_WARMUP = [
  'Standing Toe Touches', 'Bodyweight Squats', 'Alternating Lunges', 'Side (Lateral) Lunges',
  'Standing Lateral Kicks', 'Squat to Calf Raises', 'Cossack Squats', 'Knee Hugs (Walking)', 'Butt Kicks'
];
const UPPER_BODY_WARMUP = [
  'Arm Circles', 'Cross-Body Arm Swings', 'Doorway Chest Stretch', 'Shoulder Rolls',
  'Torso Twists with Knee Drive', 'Good Mornings', 'Total Body Extension (TBE)'
];
const CARDIO_MOBILITY_WARMUP = [
  'Marching in Place', 'Jumping Jacks / Star Jumps', 'High Knees', 'Inchworms', 'Jump Rope (or simulated)'
];

function warmupPoolForDay() {
  switch (answers.dayType) {
    case 'lower_body': return LOWER_BODY_WARMUP;
    case 'upper_body': return UPPER_BODY_WARMUP;
    case 'glutes_upper': return LOWER_BODY_WARMUP.concat(UPPER_BODY_WARMUP);
    case 'hiit_cardio_core': return CARDIO_MOBILITY_WARMUP;
    case 'total_body': return LOWER_BODY_WARMUP.concat(UPPER_BODY_WARMUP).concat(CARDIO_MOBILITY_WARMUP);
    default: return CARDIO_MOBILITY_WARMUP;
  }
}
function pickWarmupMoves(pool, count) {
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count);
}

function warmupBlock() {
  const isPushDay = answers.level === 'advanced' && answers.energy === 'high';
  if (answers.setting === 'commercial') {
    const extra = isPushDay ? ' Since you\'re pushing today, add 2-3 minutes of intervals (jump rope, bike sprints, or rower) before your steady warm-up.' : '';
    return { type:'cardio', text: '5 minutes on a cardio machine of your choice (treadmill, bike, elliptical, or rower).' + extra };
  }
  const bodyPartMoves = pickWarmupMoves(warmupPoolForDay(), 3).map(m => '30 sec ' + m);
  if (isPushDay) {
    const cardioMoves = pickWarmupMoves(CARDIO_MOBILITY_WARMUP, 2).map(m => '30 sec ' + m);
    return { type:'bodyweight', items: bodyPartMoves.concat(cardioMoves), pushDay:true };
  }
  return { type:'bodyweight', items: bodyPartMoves };
}

function cooldownStretches(exerciseList) {
  const pool = STRETCHES.filter(s => !s.isYoga);
  if (!exerciseList || !exerciseList.length) return pool; // Active Recovery: full non-yoga routine
  const groups = [...new Set(exerciseList.map(e => e.muscleGroup))];
  const matches = pool.filter(s => s.muscleGroups.some(g => groups.includes(g)));
  const result = matches.length ? matches : pool;
  return result.slice(0, 3);
}

function nextHiitFormat() {
  const order = ['emom','tabata','amrap'];
  const last = safeGetItem('lastHiitFormat');
  const idx = last ? (order.indexOf(last) + 1) % order.length : 0;
  const next = order[idx];
  safeSetItem('lastHiitFormat', next);
  return next;
}

function buildHiitWorkout(pool, exerciseCount) {
  const format = nextHiitFormat();
  if (format === 'emom') {
    const exercises = buildCircuit(pool, Math.min(exerciseCount + 2, 6), []);
    return { format:'emom', exercises, rounds:2, note:'1 minute per exercise, every minute on the minute. Keep weights light — 10lbs or less — for this one.' };
  }
  if (format === 'tabata') {
    const exercises = buildCircuit(pool, exerciseCount, []);
    return { format:'tabata', exercises, rounds:8, note:'20 seconds of work, 10 seconds of rest, per exercise. Move to the next exercise after each full set of 8 rounds.' };
  }
  // amrap
  if (Math.random() > 0.5) {
    const exercises = buildCircuit(pool, 2, []);
    return { format:'amrap_ascending', exercises, rounds:6, note:'Reps climb each round: 10, 20, 30, 40, 50, 60. About 6 minutes per round, with 1 minute rest between rounds.' };
  }
  const window = AMRAP_WINDOW_BY_TIME[answers.time] || 12;
  const exercises = buildCircuit(pool, exerciseCount, []);
  return { format:'amrap_fixed', exercises, window, note:`As many rounds as possible in ${window} minutes. Rest 1-2 minutes and grab water once time's up.` };
}

let currentWorkout = null;

function generateWorkoutData() {
  const dayConfig = currentDayConfig();
  if (dayConfig.recoveryOnly) {
    return { recoveryOnly:true };
  }
  const pool = filterPool();
  if (dayConfig.isHiit) {
    const hiit = buildHiitWorkout(pool, answers.phase);
    recordUsage(hiit.exercises.map(e => e.id));
    return { isHiit:true, hiit };
  }
  const circuit1 = buildCircuit(pool, answers.phase, [], []);
  recordUsage(circuit1.map(e => e.id));
  const usedIds = circuit1.map(e => e.id);
  const usedFamilies = circuit1.map(e => movementFamily(e.name));
  let circuit2 = buildCircuit(pool, answers.phase, usedIds, usedFamilies);
  if (circuit2.length < Math.min(answers.phase, 2)) {
    circuit2 = buildCircuit(pool, answers.phase, [], []);
  }
  recordUsage(circuit2.map(e => e.id));
  const circuits = [circuit1, circuit2].filter(c => c.length > 0);
  const rounds = ROUNDS_BY_TIME[answers.time] || 4;
  return { isHiit:false, circuits, rounds };
}

// Broad, client-facing category names for the workout summary header —
// coarser than the internal muscleGroup taxonomy used for pairing logic.
const BODY_PART_CATEGORY = {
  chest: 'Chest',
  back: 'Back', lats: 'Back',
  shoulders: 'Delts', rear_delts: 'Delts',
  biceps: 'Arms', triceps: 'Arms',
  quads: 'Legs', hamstrings: 'Legs', calves: 'Legs',
  glutes: 'Glutes',
  core: 'Core'
};

function workoutBodyPartSummary(exerciseList) {
  const order = ['Legs','Glutes','Back','Chest','Delts','Arms','Core'];
  const present = new Set(exerciseList.map(e => BODY_PART_CATEGORY[e.muscleGroup]).filter(Boolean));
  return order.filter(cat => present.has(cat));
}

function targetLabel(ex) {
  const fmt = g => g.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
  let label = fmt(ex.muscleGroup);
  if (ex.secondaryMuscles && ex.secondaryMuscles.length) {
    label += ' (+ ' + ex.secondaryMuscles.map(fmt).join(', ') + ')';
  }
  return label;
}

function exerciseCardHtml(ex, extraNote) {
  return `
    <div class="exercise-card">
      <p style="color:var(--gold); font-size:12.5px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin:0 0 4px;">Target: ${targetLabel(ex)}</p>
      <p class="exercise-name">${ex.name}</p>
      <p style="color:var(--gold-light); font-size:14.5px; margin:0 0 8px;">${extraNote || repTextFor(ex)}</p>
      <div class="exercise-links">
        ${ex.videoUrl ? `<a class="video-link" href="${ex.videoUrl}" target="_blank" rel="noopener">▶ Watch Demo</a>` : `<span class="video-link" style="color:var(--text-muted); cursor:default;">▶ Video coming soon</span>`}
        <button class="toggle-btn" data-target="detail-${ex.id}">View Instructions & Script</button>
      </div>
      <div class="detail-box" id="detail-${ex.id}">
        <div class="section"><span class="label">Instructions</span>${ex.instructions}</div>
        <div class="section"><span class="label">Voiceover Script</span>${ex.voiceover}</div>
      </div>
    </div>`;
}

function warmupHtml() {
  const w = warmupBlock();
  const label = w.pushDay ? 'Warm-Up — Body Part + Cardio Push' : 'Warm-Up';
  if (w.type === 'cardio') {
    return `<div class="block"><div class="block-label">${label}</div><p style="color:var(--text-secondary); margin:0;">${w.text}</p></div>`;
  }
  return `<div class="block"><div class="block-label">${label}</div><p style="color:var(--text-secondary); margin:0;">${w.items.join(' &nbsp;·&nbsp; ')}</p></div>`;
}

function cooldownHtml(exerciseList) {
  const stretches = cooldownStretches(exerciseList);
  const items = stretches.map(s => `
    <div class="exercise-card">
      <p class="exercise-name">${s.name}</p>
      <p style="color:var(--gold-light); font-size:14.5px; margin:0 0 8px;">${s.holdTime}</p>
      <button class="toggle-btn" data-target="stretch-${s.id}">View Instructions</button>
      <div class="detail-box" id="stretch-${s.id}"><div class="section">${s.instructions}</div></div>
    </div>`).join('');
  return `<div class="block"><div class="block-label">Cooldown &amp; Stretch</div>${items}</div>`;
}

function energyNote(energy) {
  if (energy === 'low') return 'Take 60–90 seconds between rounds today. This is about showing up, not maxing out.';
  if (energy === 'high') return 'Minimal rest between rounds — keep the pace moving.';
  return 'Rest 45–60 seconds between rounds, and adjust as you need to.';
}

function coachNoteHtml() {
  const specialFlags = ['cervical','ankle','other'];
  const flagged = answers.injuries.filter(i => specialFlags.includes(i));
  if (!flagged.length) return '';
  const labels = { cervical:'Cervical', ankle:'Ankle', other:'Other' };
  return `<p class="energy-note" style="color:var(--rose);">You flagged ${flagged.map(f=>labels[f]).join(', ')} — please check with your coach about any modifications before starting.</p>`;
}

function renderWorkout() {
  const main = document.getElementById('main');
  const dayConfig = currentDayConfig();
  const data = generateWorkoutData();
  currentWorkout = { date: new Date().toISOString(), answers: {...answers}, dayLabel: dayConfig.label };

  if (data.recoveryOnly) {
    main.innerHTML = `
      <div class="panel" style="max-width:680px;">
        <div class="workout-header">
          <h2>Active Recovery</h2>
          <div class="workout-meta">Light movement day — full stretch routine below</div>
        </div>
        ${cooldownHtml()}
        <div class="action-row">
          <button class="btn btn-ghost" id="restartBtn">Start Over</button>
        </div>
      </div>`;
    document.getElementById('restartBtn').addEventListener('click', restart);
    return;
  }

  if (data.isHiit) {
    const h = data.hiit;
    if (!h.exercises.length) {
      renderNoMatch();
      return;
    }
    const formatLabel = { emom:'EMOM', tabata:'TABATA', amrap_ascending:'AMRAP — Ascending Reps', amrap_fixed:'AMRAP' }[h.format];
    const exercisesHtml = h.exercises.map(ex => exerciseCardHtml(ex, h.format==='amrap_ascending' ? null : undefined)).join('');
    main.innerHTML = `
      <div class="panel" style="max-width:680px;">
        <div class="workout-header">
          <h2>Today's Workout</h2>
          <div class="workout-meta">${dayConfig.label} · ${formatLabel} · ${capitalize(answers.setting)}</div>
          <p style="color:var(--gold-light); font-size:15px; font-weight:600; letter-spacing:0.04em; margin:6px 0 0;">${workoutBodyPartSummary(h.exercises).join(' · ')}</p>
        </div>
        ${warmupHtml()}
        <p class="energy-note">${energyNote(answers.energy)}</p>
        <p class="energy-note">${h.note}</p>
        ${coachNoteHtml()}
        <div class="block">
          <div class="block-label">${formatLabel} — ${h.rounds ? h.rounds + ' rounds' : ''}</div>
          ${exercisesHtml}
        </div>
        ${cooldownHtml(h.exercises)}
        </div>
      </div>`;
    wireOutputButtons();
    return;
  }

  // Regular circuit day
  if (!data.circuits.length) { renderNoMatch(); return; }
  const circuitsHtml = data.circuits.map((circuit, i) => `
    <div class="block">
      <div class="block-label">Circuit ${i+1} — ${data.rounds} Rounds, No Rest Between Exercises</div>
      <p style="color:var(--text-muted); font-size:14px; margin:-4px 0 14px;">Move through all ${circuit.length} exercises back to back, then rest 1-2 min before the next round.</p>
      ${circuit.map(ex => exerciseCardHtml(ex)).join('')}
    </div>
  `).join('');

  main.innerHTML = `
    <div class="panel" style="max-width:680px;">
      <div class="workout-header">
        <h2>Today's Workout</h2>
        <div class="workout-meta">${dayConfig.label} · ${answers.time} min · ${capitalize(answers.setting)}</div>
        <p style="color:var(--gold-light); font-size:15px; font-weight:600; letter-spacing:0.04em; margin:6px 0 0;">${workoutBodyPartSummary(data.circuits.flat()).join(' · ')}</p>
      </div>
      ${warmupHtml()}
      <p class="energy-note">${energyNote(answers.energy)}</p>
      ${coachNoteHtml()}
      ${circuitsHtml}
      ${cooldownHtml(data.circuits.flat())}
      <div class="action-row">
        <button class="btn btn-primary" id="saveBtn">Save This Workout</button>
        <button class="btn btn-ghost" id="regenBtn">Generate a Different One</button>
        <button class="btn btn-ghost" id="restartBtn">Start Over</button>
      </div>
    </div>`;
  wireOutputButtons();
}

function renderNoMatch() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="panel">
      <h2 class="step-title">No matches yet</h2>
      <p class="step-sub">We don't have enough exercises loaded for this exact combination (equipment, injuries, and level can narrow things down a lot). Try going back and adding more equipment options, or adjusting your level.</p>
      <div class="nav-row">
        <button class="btn btn-ghost" id="backToEquipmentBtn">Adjust Equipment</button>
        <button class="btn btn-primary" id="restartBtn">Start Over</button>
      </div>
    </div>`;
  document.getElementById('restartBtn').addEventListener('click', restart);
  document.getElementById('backToEquipmentBtn').addEventListener('click', () => {
    stepIndex = STEPS.indexOf('equipment');
    renderStep();
  });
}

function wireOutputButtons() {
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = document.getElementById(btn.dataset.target);
      target.classList.toggle('open');
      btn.textContent = target.classList.contains('open') ? 'Hide Instructions' : (btn.textContent.includes('Script') ? 'View Instructions & Script' : 'View Instructions');
    });
  });
  const saveBtn = document.getElementById('saveBtn');
  if (saveBtn) saveBtn.addEventListener('click', saveCurrentWorkout);
  const regenBtn = document.getElementById('regenBtn');
  if (regenBtn) regenBtn.addEventListener('click', () => renderWorkout());
  const restartBtn = document.getElementById('restartBtn');
  if (restartBtn) restartBtn.addEventListener('click', restart);
}

function capitalize(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : ''; }

/* ============================================================
   SAVE / LOCAL STORAGE
============================================================ */
const STORAGE_KEY = 'resetRoomWorkoutsV2';

function saveCurrentWorkout() {
  if (!currentWorkout) return;
  let saved = JSON.parse(safeGetItem(STORAGE_KEY) || '[]');
  saved.unshift(currentWorkout);
  saved = saved.slice(0, 10);
  const ok = safeSetItem(STORAGE_KEY, JSON.stringify(saved));
  const btn = document.getElementById('saveBtn');
  if (btn) { btn.textContent = ok ? 'Saved ✓' : 'Could not save on this device'; btn.disabled = true; }
  updateSavedLinkVisibility();
}

function updateSavedLinkVisibility() {
  const saved = JSON.parse(safeGetItem(STORAGE_KEY) || '[]');
  const el = document.getElementById('savedLink');
  if (el) el.style.display = saved.length ? 'inline-block' : 'none';
}

function renderSavedWorkouts() {
  const saved = JSON.parse(safeGetItem(STORAGE_KEY) || '[]');
  const main = document.getElementById('main');
  if (!saved.length) {
    main.innerHTML = `<div class="panel"><p class="step-sub">No saved workouts yet.</p></div>`;
    return;
  }
  const items = saved.map(w => {
    const d = new Date(w.date);
    const dateStr = d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
    return `<div class="exercise-card" style="text-align:left;">
      <p class="exercise-name">${dateStr} — ${w.dayLabel}</p>
      <p style="color:var(--text-secondary); font-size:15px;">${w.answers.time ? w.answers.time + ' min · ' : ''}${capitalize(w.answers.setting||'')}</p>
    </div>`;
  }).join('');
  main.innerHTML = `
    <div class="panel">
      <h2 class="step-title">Your Saved Workouts</h2>
      <div style="margin-top:20px;">${items}</div>
      <div class="nav-row" style="justify-content:center;">
        <button class="btn btn-primary" id="restartBtn">Build a New Workout</button>
      </div>
    </div>`;
  document.getElementById('restartBtn').addEventListener('click', restart);
}

function restart() {
  stepIndex = 0;
  answers = { daysPerWeek:null, dayType:null, dayIndex:null, upperFocus:null, injuries:[], energy:null, time:null, setting:null, equipment:loadRememberedEquipment(), level:null, phase:null };
  currentWorkout = null;
  renderStep();
}

document.getElementById('savedLink').addEventListener('click', renderSavedWorkouts);

/* init */
try {
  updateSavedLinkVisibility();
  renderStep();
} catch(err) {
  const main = document.getElementById('main');
  if (main) {
    main.innerHTML = '<div class="panel"><h2 class="step-title">Something went wrong loading the builder</h2><p class="step-sub">' + (err && err.message ? err.message : 'Unknown error') + '</p></div>';
  }
  console.error('Reset Room Builder init error:', err);
}

</script>
</body>
</html>
