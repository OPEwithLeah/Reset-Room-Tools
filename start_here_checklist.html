<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Course Checklist — The Reset Room</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #3d2b52;
    color: #f7f1e6;
    margin: 0;
    padding: 24px;
    max-width: 620px;
    margin: 0 auto;
    min-height: 100vh;
  }
  .wrap { padding: 1rem 0; }
  .header { text-align: center; margin-bottom: 1.5rem; }
  .brand-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; color: #c9a35a; margin: 0 0 8px; text-transform: uppercase; }
  .title { font-size: 22px; font-weight: 600; margin: 0 0 6px; color: #f6e2b3; font-family: Georgia, serif; }
  .divider { width: 60px; height: 1px; background: #c9a35a; margin: 10px auto 14px; opacity: 0.5; }
  .subtitle { font-size: 13px; color: #cdb8d8; margin: 0; line-height: 1.6; }

  .progress-bar-wrap { background: rgba(255,255,255,0.06); border-radius: 20px; height: 8px; margin: 1rem 0 0.5rem; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #c9a35a; border-radius: 20px; transition: width 0.3s ease; }
  .progress-label { font-size: 12px; color: #cdb8d8; text-align: right; margin-bottom: 1rem; }

  .section { margin-bottom: 1.2rem; }
  .section-title { font-size: 11px; font-weight: 600; color: #c9a35a; text-transform: uppercase; letter-spacing: .06em; margin: 0 0 8px; padding-bottom: 6px; border-bottom: 1px solid rgba(201,163,90,0.2); }

  .item { display: flex; align-items: flex-start; gap: 12px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background .12s; margin-bottom: 2px; }
  .item:hover { background: rgba(255,255,255,0.04); }
  .item.checked { opacity: 0.6; }

  .checkbox { width: 20px; height: 20px; border: 1.5px solid #cdb8d8; border-radius: 4px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .item.checked .checkbox { background: #c9a35a; border-color: #c9a35a; }
  .checkmark { display: none; color: #2a1b3d; font-size: 13px; font-weight: 700; }
  .item.checked .checkmark { display: block; }

  .item-content { flex: 1; }
  .item-name { font-size: 13px; font-weight: 500; color: #f0e6f5; line-height: 1.4; }
  .item.checked .item-name { text-decoration: line-through; color: #a995bd; }
  .item-note { font-size: 11px; color: #a995bd; margin-top: 2px; line-height: 1.4; }
  .item-badge { font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 500; margin-left: 6px; vertical-align: middle; }
  .badge-required { background: rgba(201,163,90,0.2); color: #c9a35a; }
  .badge-optional { background: rgba(255,255,255,0.08); color: #a995bd; }
  .item-link { font-size: 11px; color: #c9a35a; text-decoration: none; margin-top: 2px; display: inline-block; }
  .item-link:hover { text-decoration: underline; }

  .complete-msg { text-align: center; padding: 1rem; background: rgba(201,163,90,0.12); border: 1px solid rgba(201,163,90,0.3); border-radius: 12px; margin-top: 1rem; display: none; }
  .complete-msg p { margin: 0; font-size: 13px; color: #f6e2b3; font-family: Georgia, serif; font-style: italic; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <p class="brand-label">The Reset Room</p>
    <p class="title">Your supply list</p>
    <div class="divider"></div>
    <p class="subtitle">Gather these before Week 1 begins. Required items are marked — everything else is optional but advised. Check each item off as you get it.</p>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progress-label">0 of 0 items checked</div>

  <div id="checklist"></div>
  <div class="complete-msg" id="complete-msg">
    <p>You are ready. Welcome to The Reset Room.</p>
  </div>
</div>

<script>
const STORAGE_KEY = 'reset-room-supply-checklist';

const sections = [
  {
    title: "Your cozy corner",
    items: [
      { id: "cozy1", name: "A dedicated cozy spot", note: "Chair, corner of the couch, or floor — wherever you feel most comfortable.", required: true },
      { id: "cozy2", name: "Blanket", note: "For cooler mornings and evenings.", required: true },
      { id: "cozy3", name: "Small side table", note: "To hold your tea, journal, and candle.", required: true },
      { id: "cozy4", name: "Soy or coconut wax candle", note: "Required for the candle meditation in the program.", required: true },
      { id: "cozy5", name: "Diffuser + aromatherapy oils", note: "See Week 2 Evening Wind Down for oil recommendations.", required: false },
      { id: "cozy6", name: "Affirmation cards", note: "Downloadable PDF available in your Resource Library.", required: false },
    ]
  },
  {
    title: "Journaling & reflection",
    items: [
      { id: "journal1", name: "Dedicated journal or notebook", note: "Something you will actually keep — not loose paper.", required: true },
      { id: "journal2", name: "A good pen", note: "One you enjoy writing with. It matters more than you think.", required: true },
      { id: "journal3", name: "Herbal tea collection", note: "Chamomile, peppermint, and valerian root to start. Full recipes in Week 2.", required: true },
    ]
  },
  {
    title: "Movement",
    items: [
      { id: "move1", name: "Yoga mat", note: "Required for floor work, stretching, and core exercises.", required: true },
      { id: "move2", name: "Dumbbells — light (3-5 lbs)", note: "For upper body and mobility work.", required: true, link: "#", linkText: "Shop on Amazon" },
      { id: "move3", name: "Dumbbells — medium (7-8 lbs)", note: "", required: true, link: "#", linkText: "Shop on Amazon" },
      { id: "move4", name: "Dumbbells — heavy (10-20 lbs)", note: "", required: true, link: "#", linkText: "Shop on Amazon" },
      { id: "move5", name: "Loop resistance band set", note: "", required: true, link: "#", linkText: "Shop on Amazon" },
      { id: "move6", name: "Food scale", note: "For tracking nutrition in later weeks.", required: true, link: "#", linkText: "Shop on Amazon" },
      { id: "move7", name: "Foam roller", note: "For recovery and mobility work.", required: false },
      { id: "move8", name: "Kettlebell", note: "Used in several HIIT and lower body workouts.", required: false },
      { id: "move9", name: "Medicine ball", note: "Used in HIIT workouts.", required: false },
      { id: "move10", name: "Step tracker", note: "Your phone works — but a dedicated tracker is advised for Week 4.", required: false },
    ]
  },
  {
    title: "Wellness & recovery",
    items: [
      { id: "well1", name: "Two water bottles you love", note: "Hydration is Week 1's first anchor. Make it easy.", required: true },
      { id: "well2", name: "Sparkling or filtered water", note: "For your hydration practice and evening wind down.", required: true },
      { id: "well3", name: "Magnesium glycinate", note: "Supports deep sleep — pairs with your Week 2 Evening Wind Down.", required: false },
      { id: "well4", name: "Tart cherry juice", note: "Natural melatonin support and recovery tool. Mix with sparkling water as a sleep mocktail.", required: false },
    ]
  },
  {
    title: "Skincare",
    items: [
      { id: "skin1", name: "Your skincare products", note: "See the Skincare as Regulation guide in Week 3 for the full routine.", required: true },
      { id: "skin2", name: "Gua sha tool", note: "Optional but recommended for the evening nourish step.", required: false },
    ]
  },
  {
    title: "Tech & apps",
    items: [
      { id: "tech1", name: "Skool app", note: "Download on your phone for community access on the go.", required: true },
      { id: "tech2", name: "YouTube app", note: "For the Movement Library workout videos.", required: true },
      { id: "tech3", name: "Spotify app", note: "For morning playlists, meditations, and affirmation audios.", required: true },
      { id: "tech4", name: "Wireless headphones", note: "For meditations, affirmations, and workouts.", required: true },
      { id: "tech5", name: "Zoom app", note: "Download if joining Sunday calls from your phone.", required: false },
    ]
  },
  {
    title: "Your reading list",
    items: [
      { id: "book1", name: "Atomic Habits — James Clear", note: "Weeks 1-3. Self-source your copy.", required: true, link: "https://youtu.be/UYxb-v__EIw?si=yxcaqrTOEEBkVgry", linkText: "Free audio version" },
      { id: "book2", name: "The Gifts of Imperfection — Brené Brown", note: "Weeks 4-6. Self-source your copy.", required: true, link: "https://www.youtube.com/watch?v=fwgIRBEVgnI", linkText: "Free audio version" },
      { id: "book3", name: "The Mountain Is You — Brianna Wiest", note: "Weeks 7-9. Self-source your copy.", required: true, link: "https://www.youtube.com/watch?v=MJJ-s_gTxFY", linkText: "Free audio version" },
      { id: "book4", name: "The Universe Has Your Back — Gabrielle Bernstein", note: "Weeks 10-12. Self-source your copy. Spotify Premium required.", required: true, link: "https://open.spotify.com/show/2B2MplvNXYjRfcBlsqIps0?si=tJFkImW4QoGOChcbOMsDIg", linkText: "Listen on Spotify" },
    ]
  },
];

// Disclaimer + Libby note rendered separately after checklist
function renderFooterNote() {
  const existing = document.getElementById('footer-note');
  if (existing) return;
  const note = document.createElement('div');
  note.id = 'footer-note';
  note.style.cssText = 'margin-top:1.5rem;padding:16px 18px;background:rgba(201,163,90,0.1);border:1.5px solid rgba(201,163,90,0.5);border-radius:10px;font-size:12px;color:#f0e6f5;line-height:1.8;';
  note.innerHTML = `
    <div style="font-size:13px;font-weight:600;color:#f6e2b3;margin-bottom:6px;">About the audio links</div>
    The YouTube audiobook links above are third-party uploads. We are not responsible if they are removed at any time during the course — copyright takedowns happen. If a link stops working, search the book title + "full audiobook" on YouTube to find an alternative.<br><br>
    <div style="font-size:13px;font-weight:600;color:#f6e2b3;margin-bottom:4px;">Free alternative — Libby (recommended)</div>
    If you have a library card, download the <a href="https://libbyapp.com" target="_blank" style="color:#c9a35a;font-weight:600;text-decoration:underline;">Libby app</a> and borrow all four books as audiobooks at no cost. No Spotify needed, no YouTube links to break. Most US library cards can be obtained online in minutes — check your county's library website.
  `;
  document.getElementById('checklist').after(note);
}

let checked = {};

function renderChecklist() {
  const container = document.getElementById('checklist');
  container.innerHTML = '';
  sections.forEach(section => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `<div class="section-title">${section.title}</div>`;
    section.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'item' + (checked[item.id] ? ' checked' : '');
      div.onclick = () => toggleItem(item.id);
      div.innerHTML = `
        <div class="checkbox"><span class="checkmark">&#10003;</span></div>
        <div class="item-content">
          <div class="item-name">${item.name}<span class="item-badge ${item.required ? 'badge-required' : 'badge-optional'}">${item.required ? 'Required' : 'Optional'}</span></div>
          ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
          ${item.link ? `<a class="item-link" href="${item.link}" target="_blank" onclick="event.stopPropagation()">${item.linkText} &rarr;</a>` : ''}
        </div>
      `;
      sec.appendChild(div);
    });
    container.appendChild(sec);
  });
  updateProgress();
}

function toggleItem(id) {
  checked[id] = !checked[id];
  save();
  renderChecklist();
}

function updateProgress() {
  const allItems = sections.flatMap(s => s.items);
  const total = allItems.length;
  const done = allItems.filter(i => checked[i.id]).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = done + ' of ' + total + ' items checked';
  const completeMsg = document.getElementById('complete-msg');
  completeMsg.style.display = done === total ? 'block' : 'none';
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(checked)); } catch(e) {}
}

function load() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) checked = JSON.parse(stored);
  } catch(e) {}
}

load();
renderChecklist();
renderFooterNote();
</script>
</body>
</html>
